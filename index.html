<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Duck Dash – Die Kicker-Ente auf WM-Tour</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#3f6b46">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duck Dash">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<style>
  /* Retro-Pixel-Look: monospace deckt ALLE Sonderzeichen (Umlaute + ES/FR-Akzente) ab,
     ist offline verfuegbar und braucht keine externe Webschrift. */
  :root {
    --pix: "Courier New", "DejaVu Sans Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1f2b;
    font-family: var(--pix);
    font-weight: 700;
    letter-spacing: 1px;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: none;
  }
  #stage {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 960px;
    aspect-ratio: 16 / 9;
  }
  #game {
    display: block;
    width: 100%; height: 100%;
    background: #2a3142;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    touch-action: none;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    color: #eef1f5;
    padding: 4%;
  }
  .hidden { display: none !important; }
  h1 {
    font-size: clamp(24px, 6vw, 52px);
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f4d35e;
    /* gestufter Pixel-Schatten statt weichem Schlagschatten */
    text-shadow: 2px 0 0 #1a1f2b, -2px 0 0 #1a1f2b, 0 2px 0 #1a1f2b,
                 0 4px 0 #b8922e, 4px 4px 0 rgba(0,0,0,0.4);
  }
  .blink { animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #pressStart {
    margin-top: 10px; color: #7cc47f; font-size: clamp(12px, 2.4vw, 18px);
    text-transform: uppercase; letter-spacing: 3px;
  }
  .subtitle {
    font-size: clamp(13px, 2.6vw, 22px);
    margin-top: 8px;
    color: #cdd5e0;
    font-weight: 500;
  }
  .big-score {
    font-size: clamp(20px, 4vw, 34px);
    font-weight: 700;
    color: #f4d35e;
    margin-top: 6px;
  }
  .btn {
    margin-top: clamp(20px, 4vh, 40px);
    padding: 13px 28px;
    font-family: var(--pix);
    font-size: clamp(14px, 2.6vw, 20px);
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #1a1f2b;
    background: #7cc47f;
    border: 3px solid #1a1f2b;        /* harter Pixel-Rahmen */
    border-radius: 0;                 /* eckig = retro */
    cursor: pointer;
    box-shadow: 4px 4px 0 #1a1f2b, inset -3px -3px 0 rgba(0,0,0,0.25), inset 3px 3px 0 rgba(255,255,255,0.25);
    transition: transform .06s, box-shadow .06s;
    image-rendering: pixelated;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1f2b, inset -3px -3px 0 rgba(0,0,0,0.25); }
  .hint {
    font-size: clamp(11px, 2.2vw, 15px);
    margin-top: 16px;
    color: #9aa6b5;
  }
  .flag {
    width: clamp(120px, 28vw, 200px);
    height: clamp(80px, 18vw, 130px);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    margin-bottom: 18px;
    display: flex;
  }
  .flag > div { flex: 1; }
  .langBtn {
    padding: 8px 12px;
    font-size: 14px; font-weight: 700;
    color: #eef1f5;
    background: rgba(255,255,255,0.10);
    border: 2px solid transparent;
    border-radius: 0;
    cursor: pointer;
  }
  .langBtn.active { border-color: #f4d35e; background: rgba(244,211,94,0.15); }
  .shopSection { font-weight:700; color:#f4d35e; text-align:left; margin:14px 4px 6px; font-size:16px; }
  .shopItem {
    display:flex; align-items:center; gap:12px;
    background: rgba(255,255,255,0.07);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
  }
  .shopItem .info { flex:1; text-align:left; }
  .shopItem .name { font-weight:700; font-size:15px; }
  .shopItem .desc { font-size:12px; color:#9aa6b5; }
  .shopItem .act {
    padding:8px 16px; border:2px solid #1a1f2b; border-radius:0;
    font-family:var(--pix); font-weight:800; font-size:13px; text-transform:uppercase;
    cursor:pointer; min-width:88px; box-shadow:2px 2px 0 #1a1f2b;
  }
  .act.buy { background:#7cc47f; color:#1a1f2b; }
  .act.equip { background:#6fa3c7; color:#1a1f2b; }
  .act.owned { background:rgba(255,255,255,0.15); color:#cdd5e0; }
  .act.active { background:#f4d35e; color:#1a1f2b; }
  .act.disabled { background:rgba(255,255,255,0.08); color:#6b7585; cursor:not-allowed; }
  .swatch { width:34px; height:34px; border-radius:8px; flex-shrink:0; }
  .nameEntry { display:flex; gap:8px; align-items:center; margin:14px 0 4px; }
  .nameInput {
    padding:10px 14px; font-size:16px; border-radius:10px;
    border:2px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.25);
    color:#eef1f5; width:160px; text-align:center;
  }
  #boardList li {
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.06); border-radius:10px;
    padding:9px 14px; margin-bottom:6px; font-size:15px;
  }
  #boardList li .rank { width:28px; font-weight:800; color:#f4d35e; }
  #boardList li .nm { flex:1; text-align:left; font-weight:600; }
  #boardList li .sc { font-weight:700; color:#cdd5e0; }
  #boardList li.me { border:2px solid #f4d35e; }
  #boardList .empty { color:#9aa6b5; text-align:center; padding:20px; }
  #confetti { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  #confetti span {
    position:absolute; top:-20px; width:10px; height:14px; border-radius:2px;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity:0.7; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="960" height="540"></canvas>

  <div id="menu" class="overlay">
    <h1>Duck Dash</h1>
    <div id="mSub" class="subtitle">Die Kicker-Ente auf WM-Tour</div>
    <div id="langRow" style="display:flex;gap:8px;margin-top:16px;">
      <button class="langBtn" data-lang="de">🇩🇪 DE</button>
      <button class="langBtn" data-lang="en">🇬🇧 EN</button>
      <button class="langBtn" data-lang="es">🇪🇸 ES</button>
      <button class="langBtn" data-lang="fr">🇫🇷 FR</button>
    </div>
    <div id="modeRow" style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center;"></div>
    <div id="diffRow" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;"></div>
    <div id="pressStart" class="blink">▶ PRESS START</div>
    <button id="startBtn" class="btn">Spiel starten</button>
    <div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap;justify-content:center;">
      <button id="shopBtn" class="btn" style="margin-top:0;background:#e0b97a;box-shadow:0 5px 0 #b8945a;font-size:16px;padding:10px 22px;">🛒 Shop</button>
      <button id="boardBtn" class="btn" style="margin-top:0;background:#c7b06f;box-shadow:0 5px 0 #9e8b54;font-size:16px;padding:10px 22px;">🏅</button>
      <button id="settingsBtn" class="btn" style="margin-top:0;background:#9aa6b5;box-shadow:0 5px 0 #76808d;font-size:15px;padding:10px 16px;">⚙️</button>
    </div>
    <div id="mHint" class="hint">…</div>
    <div id="eggProgress" class="hint" style="margin-top:8px;color:#c7b06f;">🌍 0/4</div>
  </div>

  <div id="egg" class="overlay hidden">
    <div id="confetti"></div>
    <h1 style="color:#f0d061;">✨ Golden Quack! ✨</h1>
    <div id="eggText" class="subtitle">Du hast Duck Dash in allen 4 Sprachen gemeistert!</div>
    <div class="big-score" style="font-size:60px;">🦆👑</div>
    <button id="eggBtn" class="btn">🎉</button>
  </div>

  <div id="shop" class="overlay hidden" style="justify-content:flex-start;overflow-y:auto;">
    <h1 style="font-size:clamp(24px,5vw,40px);margin-top:8px;">🛒 <span id="shopTitle">Shop</span></h1>
    <div id="shopCoins" class="subtitle" style="color:#f4d35e;font-weight:700;">🪙 0</div>
    <div id="shopList" style="width:100%;max-width:680px;margin-top:14px;"></div>
    <button id="shopClose" class="btn">Zurück</button>
  </div>

  <div id="settings" class="overlay hidden" style="justify-content:flex-start;overflow-y:auto;">
    <h1 style="font-size:clamp(24px,5vw,40px);margin-top:12px;">⚙️ <span id="setTitle">Einstellungen</span></h1>
    <div id="setList" style="width:100%;max-width:520px;margin-top:18px;"></div>
    <button id="setClose" class="btn">Zurück</button>
  </div>

  <div id="over" class="overlay hidden">
    <h1>Game Over</h1>
    <div id="overHigh" class="big-score blink hidden" style="color:#7cc47f;font-size:clamp(16px,3vw,26px);">★ NEW HIGHSCORE ★</div>
    <div class="subtitle">Score</div>
    <div id="finalScore" class="big-score">0</div>
    <div id="overEntry" class="nameEntry">
      <input id="overName" class="nameInput" maxlength="12" placeholder="Name">
      <button id="overSave" class="btn" style="margin-top:0;padding:10px 20px;font-size:16px;">💾</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <button id="retryBtn" class="btn">Nochmal</button>
      <button id="overBoard" class="btn" style="background:#c7b06f;box-shadow:0 5px 0 #9e8b54;">🏅</button>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <h1 id="pauseTitle">Pause</h1>
    <button id="resumeBtn" class="btn">Weiter</button>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <button id="pauseSettings" class="btn" style="background:#9aa6b5;box-shadow:4px 4px 0 #1a1f2b;">⚙️</button>
      <button id="pauseMenu" class="btn" style="background:#c7b06f;box-shadow:4px 4px 0 #1a1f2b;">🏠</button>
    </div>
  </div>

  <div id="story" class="overlay hidden">
    <div id="storyFlag" class="flag"></div>
    <h1 id="storyCountry">Land</h1>
    <div id="storyText" class="subtitle">…</div>
    <button id="storyBtn" class="btn">Los!</button>
  </div>

  <div id="win" class="overlay hidden">
    <h1>🏆 Weltmeister!</h1>
    <div class="subtitle">Duck Dash gewonnen</div>
    <div id="winHigh" class="big-score blink hidden" style="color:#7cc47f;font-size:clamp(16px,3vw,26px);">★ NEW HIGHSCORE ★</div>
    <div id="winScore" class="big-score">0</div>
    <div id="winEntry" class="nameEntry">
      <input id="winName" class="nameInput" maxlength="12" placeholder="Name">
      <button id="winSave" class="btn" style="margin-top:0;padding:10px 20px;font-size:16px;">💾</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <button id="winBtn" class="btn">Nochmal</button>
      <button id="winBoard" class="btn" style="background:#c7b06f;box-shadow:0 5px 0 #9e8b54;">🏅</button>
    </div>
  </div>

  <div id="board" class="overlay hidden" style="justify-content:flex-start;overflow-y:auto;">
    <h1 style="font-size:clamp(24px,5vw,40px);margin-top:12px;">🏅 <span id="boardTitle">Bestenliste</span></h1>
    <ol id="boardList" style="list-style:none;width:100%;max-width:420px;margin-top:16px;padding:0;"></ol>
    <button id="boardClose" class="btn">Zurück</button>
  </div>
</div>

<script>
"use strict";

/* =========================================================================
   Duck Dash — Engine-Geruest
   Module: CONFIG · PALETTE · SAVE · INPUT · AUDIO · RENDER · SCENES · ENTITIES
   Daten: LEVELS · I18N · SKINS · POWERUPS · Store · ScoreStore
   ========================================================================= */

/* ---------- CONFIG: alle Tuning-Werte an einer Stelle ---------- */
const CONFIG = {
  W: 960, H: 540,            // logische Aufloesung (Render-Skala folgt in Schritt 2)
  GROUND_OFFSET: 96,         // Abstand Boden vom unteren Rand
  // Physik
  GRAVITY: 2600,             // px/s^2
  JUMP_V: -820,              // Absprung-Geschwindigkeit
  DOUBLE_FACTOR: 0.92,       // Doppelsprung-Staerke
  MAX_FALL: 1500,
  COYOTE_TIME: 0.10,         // s nach Kante noch springbar
  BUFFER_TIME: 0.12,         // s Input-Puffer vor Landung
  SLIDE_TIME: 0.55,          // s Dauer Slide
  // Welt-Tempo
  BASE_SPEED: 360,           // px/s
  SPEED_RAMP: 7,             // px/s pro Sekunde (Faktor 6 im Update)
  SPEED_MAX: 760,
  // Etappen
  LEVEL_GOAL: 2200,          // px Strecke pro Etappe
  // Leben
  MAX_LIVES: 3,
  INVULN_TIME: 1.4,          // s Unverwundbarkeit nach Treffer
};
const W = CONFIG.W, H = CONFIG.H;
const GROUND_Y = H - CONFIG.GROUND_OFFSET;

/* ---------- PALETTE: feste Retro-Farbpalette (genau 16 Farben) ----------
   Markenrollen: Primär = Spielfeldgrün, Sekundär = Stadionblau,
   Akzent = Pokalgold. Wenn finale Marken-Hexwerte vorliegen, nur die drei
   BRAND-Werte und die zugehörigen PALETTE-Einträge austauschen – die Sprites
   bleiben palette-indiziert. */
const BRAND = Object.freeze({
  primary: "#5d8a54", secondary: "#5e87b7", accent: "#f1c75b",
});
const PALETTE = Object.freeze({
  ink:    "#1b1f2a", night:  "#2c3548", slate: "#59657b", steel: "#7188a3",
  sky:    "#8daeb8", cloud:  "#c8d7d8", snow:  "#f7f0dc", grass: "#5d8a54",
  grassD: "#3f6648", gold:   "#f1c75b", amber: "#c99a45", orange:"#e8893d",
  red:    "#bf5c62", rose:   "#df7c81", azure: "#5e87b7", green: "#7bbf79",
});

/* ---------- SAVE: gekapselter localStorage-Zugriff ---------- */
const SAVE = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v === null ? fallback : v; }
    catch (e) { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem(key, String(val)); } catch (e) {}
  },
  getJSON(key, fallback) {
    try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
    catch (e) { return fallback; }
  },
  setJSON(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  },
  getInt(key, fallback) {
    const n = parseInt(this.get(key, ""), 10);
    return isFinite(n) ? n : fallback;
  },
};

/* ---------- Zustaende ---------- */
const State = {
  MENU: "MENU", STORY: "STORY", PLAY: "PLAY", PAUSE: "PAUSE",
  GAMEOVER: "GAMEOVER", WIN: "WIN", SHOP: "SHOP", BOARD: "BOARD",
  EGG: "EGG", SETTINGS: "SETTINGS",
};

/* ---------- WM-Etappen ---------- */
const LEVELS = [
  { key: "br", country: "Brasilien", flag: ["#3a7d44", "#e6c84f", "#2f5d8a"],
    sky: ["#3f5a6b", "#6f917f"], grass: ["#5f8f5a", "#487045"], accent: "#3f6b46" },
  { key: "de", country: "Deutschland", flag: ["#2b2b2b", "#b23b3b", "#d9b64a"],
    sky: ["#43506b", "#7a8294"], grass: ["#5c8a57", "#456b42"], accent: "#555f6e" },
  { key: "jp", country: "Japan", flag: ["#e9e6e0", "#c75450", "#e9e6e0"],
    sky: ["#5a4f63", "#9a8a8f"], grass: ["#6a8f63", "#4f7049"], accent: "#7a6770" },
  { key: "us", country: "USA", flag: ["#3a4a7a", "#d9dde3", "#b23b4a"],
    sky: ["#414a63", "#74809a"], grass: ["#5f8f5a", "#487045"], accent: "#4a5570" },
  { key: "ar", country: "Argentinien", flag: ["#6fa3c7", "#eef1f5", "#6fa3c7"],
    sky: ["#48586b", "#8aa0b0"], grass: ["#5c8a57", "#456b42"], accent: "#5a7689" },
  { key: "fin", country: "WM-Finale", flag: ["#b8922e", "#e6c84f", "#b8922e"],
    sky: ["#3a3550", "#6b5f7a"], grass: ["#5f8f5a", "#487045"], accent: "#7a6a3a" },
];

/* ---------- Modi (daten-getrieben) ----------
   'normal' = Hauptspiel: zeitloser Endlos-Run mit Wellen, neutrales Setting.
   'wm'     = Feature/Saison: Laender-Etappen + Story. */
const NORMAL_THEMES = [
  { key: "day",   flag: ["#5f8f5a", "#9fc0d4", "#4a6e8a"], sky: ["#5b7fa6", "#9fc0d4"], grass: ["#5f8f5a", "#487045"], accent: "#4a6e8a", sl: "hills" },
  { key: "dusk",  flag: ["#caa07a", "#7a5a6a", "#6b4f73"], sky: ["#6b4f73", "#caa07a"], grass: ["#6a7e54", "#4f6440"], accent: "#7a5a6a", sl: "city" },
  { key: "night", flag: ["#46506b", "#2a2f4a", "#3a4570"], sky: ["#2a2f4a", "#46506b"], grass: ["#3f5f48", "#2f4838"], accent: "#3a4570", sl: "night" },
];
const MODES = {
  normal: {
    id: "normal", emoji: "♾️", endless: true, hasStory: false,
    label: { de: "Endlos", en: "Endless", es: "Sin fin", fr: "Sans fin" },
    desc:  { de: "Unendlicher Lauf", en: "Endless run", es: "Carrera sin fin", fr: "Course sans fin" },
    themes: NORMAL_THEMES,
  },
  wm: {
    id: "wm", emoji: "🏆", endless: false, hasStory: true,
    label: { de: "WM-Tour", en: "World Cup", es: "Mundial", fr: "Mondial" },
    desc:  { de: "6 Länder + Story", en: "6 countries + story", es: "6 países + historia", fr: "6 pays + histoire" },
    themes: LEVELS,
  },
};
function modeThemes() { return MODES[G.mode].themes; }
function currentTheme() { const a = modeThemes(); return a[G.levelIndex % a.length] || a[0]; }

/* ---------- Schwierigkeit (Easy/Normal) ---------- */
const DIFFS = {
  easy:   { id: "easy",   emoji: "🐣", label: { de: "Einfach", en: "Easy", es: "Fácil", fr: "Facile" },
            speedMax: 480, gapMul: 1.35, slideChance: 0.18, lives: 5, invuln: 2.0 },
  normal: { id: "normal", emoji: "🦆", label: { de: "Normal", en: "Normal", es: "Normal", fr: "Normal" },
            speedMax: CONFIG.SPEED_MAX, gapMul: 1.0, slideChance: 0.33, lives: CONFIG.MAX_LIVES, invuln: CONFIG.INVULN_TIME },
};
function diff() { return DIFFS[G.difficulty] || DIFFS.normal; }

/* ---------- Mehrsprachigkeit ---------- */
const I18N = {
  de: {
    soundOn: "🔊", soundOff: "🔇",
    subtitle: "Die Kicker-Ente auf WM-Tour",
    start: "Spiel starten", retry: "Nochmal", go: "Los!",
    hintCtrl: "Springen: Leertaste / ↑ / W / Tipp · Ducken: ↓ / S / Wisch runter",
    gameover: "Game Over", scoreLabel: "Punkte", best: "Best", meters: "m", wave: "Welle", modeLabel: "Modus", diffLabel: "Schwierigkeit",
    win: "🏆 Weltmeister!", winSub: "Duck Dash gewonnen",
    countries: { br: "Brasilien", de: "Deutschland", jp: "Japan", us: "USA", ar: "Argentinien", fin: "WM-Finale" },
    stories: {
      br: "Anpfiff in Rio! Watschel über den Strand-Platz.",
      de: "Weiter nach Deutschland – präzises Timing zählt!",
      jp: "Konnichiwa! In Japan wird's flink und flott.",
      us: "Big Game in den USA – volle Tribünen!",
      ar: "Halbfinale in Argentinien – die Menge tobt!",
      fin: "Das große Finale! Watschel zum Pokal.",
    },
  },
  en: {
    soundOn: "🔊", soundOff: "🔇",
    subtitle: "The Rubber Duck on World Cup Tour",
    start: "Start Game", retry: "Again", go: "Go!",
    hintCtrl: "Jump: Space / ↑ / W / Tap · Duck: ↓ / S / Swipe down",
    gameover: "Game Over", scoreLabel: "Score", best: "Best", meters: "m", wave: "Wave", modeLabel: "Mode", diffLabel: "Difficulty",
    win: "🏆 World Champion!", winSub: "Duck Dash won",
    countries: { br: "Brazil", de: "Germany", jp: "Japan", us: "USA", ar: "Argentina", fin: "World Cup Final" },
    stories: {
      br: "Kick-off in Rio! Waddle across the beach pitch.",

const Store = {
  coins: 0, owned: ["classic"], skin: "classic", active: [],
  load() {
    this.coins = SAVE.getInt("dd_coins", 0);
    this.owned = SAVE.getJSON("dd_owned", ["classic"]);
    this.skin = SAVE.get("dd_skin", "classic");
    this.active = SAVE.getJSON("dd_active", []);
    if (!this.owned.includes("classic")) this.owned.push("classic");
  },
  save() {
    SAVE.set("dd_coins", this.coins);
    SAVE.setJSON("dd_owned", this.owned);
    SAVE.set("dd_skin", this.skin);
    SAVE.setJSON("dd_active", this.active);
  },
  addCoins(n) { this.coins += n; this.save(); },
  has(id) { return this.owned.includes(id); },
  buy(item) {
    if (this.has(item.id) || this.coins < item.price) return false;
    this.coins -= item.price; this.owned.push(item.id); this.save(); return true;
  },
  equipSkin(id) { if (this.has(id)) { this.skin = id; this.save(); } },
  togglePower(id) {
    if (!this.has(id)) return;
    const i = this.active.indexOf(id);
    if (i >= 0) this.active.splice(i, 1); else this.active.push(id);
    this.save();
  },
  isActive(id) { return this.active.includes(id); },
  currentSkin() { return SKINS.find((s) => s.id === this.skin) || SKINS[0]; },
};

// Kombo: jeder gesammelte Ball erhoeht die Kette, alle 5 steigt der Multiplikator (max x5)
function addCombo() {
  G.combo++;
  G.comboMult = Math.min(5, 1 + Math.floor(G.combo / 5));
}
function resetCombo() { G.combo = 0; G.comboMult = 1; }

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 180;
    G.particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 0.5 + Math.random() * 0.4, t: 0, color, r: 2 + Math.random() * 3,
    });
  }
}

/* Hindernisse — daten-getrieben ueber Schwierigkeit + Welle/Etappe */
function spawnObstacle() {
  const d = diff();
  const gm = d.gapMul;
  // Wellen-/Etappen-Index (in beiden Modi) treibt Vielfalt
  const lvl = MODES[G.mode].endless ? G.wave : G.levelIndex;
  const r = Math.random();
  const highEnd = 0.42;
  const lowEnd = highEnd + d.slideChance;   // weniger Slide-Hindernisse im Easy-Modus
  let o;
  if (r < highEnd) {
    const h = 84 + Math.random() * 40;
    o = { type: "high", w: 46 + Math.random() * 28, h, x: W + 40, y: GROUND_Y - h, passed: false, near: false };
  } else if (r < lowEnd) {
    const gap = 40, h = 150;
    o = { type: "low", w: 66 + Math.random() * 34, h, x: W + 40, y: GROUND_Y - gap - h, passed: false, near: false };
  } else {
    const h = 46 + Math.random() * 22;
    o = { type: "cone", w: 44, h, x: W + 40, y: GROUND_Y - h, passed: false, near: false };
  }
  G.obstacles.push(o);
  // Muster werden mit Welle/Etappe abwechslungsreicher, bleiben aber fair schaffbar
  const followChance = 0.24 + lvl * 0.03;
  if (o.type !== "low" && Math.random() < followChance) {
    const fh = 46 + Math.random() * 20;
    const followGap = (150 + Math.random() * 40) * gm;   // genug zum Landen + neu Abspringen
    G.obstacles.push({ type: "cone", w: 44, h: fh, x: o.x + o.w + followGap, y: GROUND_Y - fh, passed: false, near: false });
    if (lvl >= 2 && Math.random() < 0.3) {
      const th = 46 + Math.random() * 18;
      G.obstacles.push({ type: "cone", w: 44, h: th, x: o.x + o.w + followGap * 2 + 44, y: GROUND_Y - th, passed: false, near: false });
    }
  }
}
function nextSpawnDelay() {
  const tt = G.speed / CONFIG.BASE_SPEED;
  return ((1.15 / tt) + Math.random() * 0.55 / tt) * diff().gapMul;
}
function spawnCollectible() {
  const trophy = Math.random() < 0.06;
  const heights = [70, 120, 180, 240];
  const yOff = heights[Math.floor(Math.random() * heights.length)];
  const size = trophy ? 30 : 22;
  G.collectibles.push({
    type: trophy ? "trophy" : "ball",
    x: W + 30, y: GROUND_Y - yOff, r: size / 2, size,
    bob: Math.random() * Math.PI * 2, taken: false,
  });
}
function collectAt(o) {
  o.taken = true;
  addCombo();
  if (o.type === "trophy") { G.score += 200 * G.comboMult; G.balls += 5; burst(o.x, o.y, PALETTE.gold, 22); AUDIO.sfx.trophy(); }
  else { G.score += 5 * G.comboMult; G.balls += 1; burst(o.x, o.y, PALETTE.snow, 10); AUDIO.sfx.coin(); }
}
function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// Near-Miss-Bonus: knapp an einem Hindernis vorbei (ohne Treffer) gibt Extrapunkte
function checkNearMiss() {
  const hb = duck.hitbox();
  for (const o of G.obstacles) {
    if (o.near || o.x + o.w > duck.x) continue;          // erst zaehlen, wenn vorbei
    // war es knapp? kleiner vertikaler Abstand zur Hindernis-Kante
    const margin = 18;
    const close = (o.type === "low")
      ? (hb.y < o.y + o.h + margin)                       // dicht unter der Bande durch
      : (hb.y + hb.h > o.y - margin);                     // dicht ueber dem Hindernis
    o.near = true;
    if (close && G.invuln <= 0) {
      G.score += 15 * G.comboMult; G.nearMiss = true;
      burst(duck.x + duck.w, duck.y + duck.h / 2, PALETTE.gold, 4);
      AUDIO.tone(1568, 0.05, "square", 0.06);
    }
  }
}

// Gewaltfreier Zusatz-Move: kurzes Gleiten/Flattern (einmal pro Luftphase)
function startGlide() {
  if (SCENES.current !== State.PLAY) return;
  if (!duck.onGround && !G.glideUsed) {
    G.glide = 0.45; G.glideUsed = true;
    if (duck.vy > 120) duck.vy = 120;                     // bremst den Fall sanft ab
    burst(duck.x + duck.w * 0.3, duck.y + duck.h, PALETTE.cloud, 5);
    AUDIO.tone(880, 0.08, "triangle", 0.07, 1100);
  }
}

function hitObstacle() {
  if (G.invuln > 0) return;
  resetCombo();
  if (G.shieldUp) {
    G.shieldUp = false; G.invuln = CONFIG.INVULN_TIME; G.shake = 0.25; G.flash = 0.12;
    burst(duck.x + duck.w / 2, duck.y + duck.h / 2, PALETTE.azure, 16);
    AUDIO.sfx.hit(); return;
  }
  G.lives--; G.invuln = CONFIG.INVULN_TIME; G.shake = 0.4; G.flash = 0.18;
  burst(duck.x + duck.w / 2, duck.y + duck.h / 2, "#d9b64a", 14);
  if (G.lives <= 0) { gameOver(); } else AUDIO.sfx.hit();
}

/* =========================================================================
   AUDIO: WebAudio Chiptune-Engine (Vollausbau in Schritt 5)
   ========================================================================= */
const AUDIO = {
  muted: SAVE.get("dd_muted", "0") === "1",
  ctx: null,
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  tone(freq, dur, type, vol, glideTo) {
    if (this.muted || !this.ctx) return;
    const a = this.ctx, now = a.currentTime;
    const osc = a.createOscillator(), gain = a.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, now);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, now + dur);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(vol || 0.18, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain); gain.connect(a.destination);
    osc.start(now); osc.stop(now + dur + 0.02);
  },
  seq(notes) {
    if (this.muted || !this.ctx) return;
    notes.forEach(([f, d, dur, ty]) => setTimeout(() => this.tone(f, dur || 0.12, ty || "square", 0.16), d));
  },
  // 8-Bit Rausch-Burst (Noise) fuer Treffer/Game-Over
  noise(dur, vol, hp) {
    if (this.muted || !this.ctx) return;
    const a = this.ctx, now = a.currentTime, len = Math.floor(a.sampleRate * dur);
    const buf = a.createBuffer(1, len, a.sampleRate), data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = a.createBufferSource(); src.buffer = buf;
    const g = a.createGain(); g.gain.setValueAtTime(vol || 0.12, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    const filt = a.createBiquadFilter(); filt.type = "highpass"; filt.frequency.value = hp || 400;
    src.connect(filt); filt.connect(g); g.connect(a.destination);
    src.start(now); src.stop(now + dur);
  },
  setMuted(m) {
    this.muted = m; SAVE.set("dd_muted", m ? "1" : "0");
  },
  sfx: {
    jump:   () => AUDIO.tone(420, 0.12, "square", 0.12, 760),
    coin:   () => { AUDIO.tone(988, 0.07, "square", 0.13); setTimeout(() => AUDIO.tone(1319, 0.09, "square", 0.12), 55); },
    trophy: () => AUDIO.seq([[659,0,0.10],[880,80,0.10],[1175,160,0.16],[1568,260,0.2]]),
    hit:    () => { AUDIO.tone(220, 0.16, "square", 0.14, 90); AUDIO.noise(0.18, 0.12, 300); },
    levelup:() => AUDIO.seq([[523,0,0.10],[659,100,0.10],[784,200,0.10],[1047,300,0.2]]),
    over:   () => { AUDIO.seq([[392,0,0.16,"square"],[311,160,0.16,"square"],[233,330,0.32,"square"]]); AUDIO.noise(0.3, 0.10, 200); },

// robustes Hex-Parsing: liefert [r,g,b], faellt auf Mittelgrau zurueck
function hexRGB(hex) {
  if (typeof hex !== "string") return [128, 128, 128];
  let h = hex.trim().replace(/^#/, "");
  if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
  if (h.length !== 6 || /[^0-9a-fA-F]/.test(h)) return [128, 128, 128];
  const n = parseInt(h, 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function toHex(r, g, b) {
  const c = (v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0");
  return "#" + c(r) + c(g) + c(b);
}
// shade(): gibt IMMER einen gueltigen Hex-Wert zurueck
function shade(hex, f) {
  const [r, g, b] = hexRGB(hex);
  return toHex(r * f, g * f, b * f);
}
// drawBands(): banded Vertical-Fill zwischen zwei Farben (statt teurem Per-Frame-Gradient)
function drawBands(x, y, w, h, c0, c1, steps) {
  const a = hexRGB(c0), b = hexRGB(c1), n = Math.max(2, steps || 5);
  const bh = Math.ceil(h / n);
  for (let i = 0; i < n; i++) {
    const f = i / (n - 1);
    ctx.fillStyle = toHex(a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f, a[2] + (b[2] - a[2]) * f);
    ctx.fillRect(x, y + i * bh, w, bh + 1);
  }
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawSprite(rows, x, y, w, h, pal) {
  let cols = 0;
  for (const r of rows) if (r.length > cols) cols = r.length;
  const cw = w / cols, chh = h / rows.length;
  for (let r = 0; r < rows.length; r++) {
    const row = rows[r];
    for (let c = 0; c < row.length; c++) {
      const ch = row[c];
      if (ch === "." || ch === " ") continue;
      const col = pal[ch];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(x + c * cw, y + r * chh, cw + 0.6, chh + 0.6);
    }
  }
}

/* =========================================================================
   Gameplay-Schritte: Etappe / Game Over / Sieg
   ========================================================================= */
function advanceLevel() {
  const mode = MODES[G.mode];
  if (mode.endless) {
    // Endlos: naechste Welle, neues Theme, weiterspielen (kein Story-Stopp)
    G.wave++;
    G.levelIndex = G.wave % mode.themes.length;
    G.levelDist = 0; G.score += 50;
    G.waveBanner = 1.8;
    AUDIO.sfx.levelup();
    return;
  }
  // WM-Tour: Story zwischen Laendern, echtes Finale am Ende
  if (G.levelIndex >= LEVELS.length - 1) { winGame(); return; }
  G.levelIndex++; G.levelDist = 0; G.score += 100; AUDIO.sfx.levelup();
  SCENES.showStory(G.levelIndex);
}

function winGame() {
  G.newHigh = Math.floor(G.score) > G.best;
  const wh = document.getElementById("winHigh"); wh.textContent = NEWHIGH[lang]; wh.classList.toggle("hidden", !G.newHigh);
  saveBest(); Store.addCoins(G.balls); AUDIO.sfx.win();
  pendingEgg = markLangCompleted(lang);
  G.currentRunScore = Math.floor(G.score);
  winScoreEl.textContent = G.currentRunScore;
  winEntry.style.display = "flex"; winName.value = defaultName(); lastSavedTs = null;
  SCENES.go(State.WIN);
}
function gameOver() {
  G.newHigh = Math.floor(G.score) > G.best;
  const oh = document.getElementById("overHigh"); oh.textContent = NEWHIGH[lang]; oh.classList.toggle("hidden", !G.newHigh);
  saveBest(); Store.addCoins(G.balls);
  G.currentRunScore = Math.floor(G.score);
  finalScoreEl.textContent = G.currentRunScore;
  overEntry.style.display = "flex"; overName.value = defaultName(); lastSavedTs = null;
  AUDIO.sfx.over();
  SCENES.go(State.GAMEOVER);
}

function markLangCompleted(l) {
  if (!completedLangs.includes(l)) { completedLangs.push(l); SAVE.setJSON("dd_langsdone", completedLangs); }
  updateEggProgress();

  current: State.MENU,
  defs: {},
  overlays() {
    return {
      [State.MENU]: menuEl, [State.GAMEOVER]: overEl, [State.STORY]: storyEl,
      [State.WIN]: winEl, [State.SHOP]: shopEl, [State.BOARD]: boardEl,
      [State.EGG]: eggEl, [State.SETTINGS]: settingsEl, [State.PAUSE]: pauseEl,
    };
  },
  toggleOverlays() {
    const map = this.overlays();
    for (const key in map) map[key].classList.toggle("hidden", this.current !== key);
  },
  go(next, payload) {
    const prev = this.defs[this.current];
    if (prev && prev.exit) prev.exit();
    this.current = next;
    if (typeof FX !== "undefined") FX.startTransition();
    this.toggleOverlays();
    const def = this.defs[next];
    if (def && def.enter) def.enter(payload);
  },
  showStory(idx) {
    const lv = LEVELS[idx];
    storyFlagEl.innerHTML =
      '<div style="background:' + lv.flag[0] + '"></div>' +
      '<div style="background:' + lv.flag[1] + '"></div>' +

    storyCountryEl.textContent = tCountry(lv.key);
    storyTextEl.textContent = tStory(lv.key);
    this.go(State.STORY);
  },
  update(dt) { const d = this.defs[this.current]; if (d && d.update) d.update(dt); },
  draw() { const d = this.defs[this.current]; if (d && d.draw) d.draw(); },
};

// PLAY-Szene: die eigentliche Spielschleife
SCENES.defs[State.PLAY] = {
  update(dt) {
    const d = diff();
    G.runTime += dt;
    G.distance += G.speed * dt; G.levelDist += G.speed * dt; G.bgScroll += G.speed * dt;
    // Tempo-Burst: kurzer Schub am Wellen-/Etappenanfang (mechanische Abwechslung)
    const burstBoost = G.waveBanner > 0 ? 80 : 0;
    G.speed = CONFIG.BASE_SPEED + G.runTime * CONFIG.SPEED_RAMP * 6 + burstBoost;
    if (G.speed > d.speedMax) G.speed = d.speedMax;

    if (G.waveBanner > 0) G.waveBanner -= dt;

    if (G.levelDist >= CONFIG.LEVEL_GOAL) { advanceLevel(); return; }

    G.score += dt * (G.speed / 36) * G.scoreMult * G.comboMult;

    if (duck.coyote > 0) duck.coyote -= dt;
    if (duck.buffer > 0) duck.buffer -= dt;
    if (G.invuln > 0) G.invuln -= dt;
    if (G.shake > 0) G.shake -= dt;
    if (G.flash > 0) G.flash -= dt;
    if (G.glide > 0) G.glide -= dt;
    if (duck.sliding) { duck.slideT -= dt; if (duck.slideT <= 0) endSlide(); }

    tryConsumeJump();

    const wasGround = duck.onGround;
    // Gleiten/Flattern: sanft fallen, solange Glide aktiv und Ente faellt
    const grav = (G.glide > 0 && duck.vy > 0) ? CONFIG.GRAVITY * 0.28 : CONFIG.GRAVITY;
    duck.vy += grav * dt;
    if (duck.vy > CONFIG.MAX_FALL) duck.vy = CONFIG.MAX_FALL;
    duck.y += duck.vy * dt;
    const floor = GROUND_Y - duck.h;
    if (duck.y >= floor) {
      duck.y = floor; if (!wasGround) { duck.jumps = 0; G.glideUsed = false; } duck.onGround = true; duck.vy = 0;
    } else { if (wasGround) duck.coyote = CONFIG.COYOTE_TIME; duck.onGround = false; }

    G.spawnTimer -= dt;
    if (G.spawnTimer <= 0) { spawnObstacle(); G.spawnTimer = nextSpawnDelay(); }

    for (const o of G.obstacles) {
      o.x -= G.speed * dt;
      if (!o.passed && o.x + o.w < duck.x) { o.passed = true; G.score += 10; }
    }
    G.obstacles = G.obstacles.filter((o) => o.x + o.w > -20);

    checkNearMiss();

    G.collectTimer -= dt;
    if (G.collectTimer <= 0) { spawnCollectible(); G.collectTimer = 0.8 + Math.random() * 1.0; }
    const hb = duck.hitbox();
    const dcx = duck.x + duck.w / 2, dcy = duck.y + duck.h / 2;
    for (const c of G.collectibles) {
      c.x -= G.speed * dt; c.bob += dt * 4;
      if (G.magnetOn && !c.taken) {
        const dx = dcx - c.x, dy = dcy - c.y, d = Math.hypot(dx, dy);
        if (d < 200 && d > 1) { c.x += (dx / d) * 320 * dt; c.y += (dy / d) * 320 * dt; }
      }
      if (!c.taken && aabb(hb.x, hb.y, hb.w, hb.h, c.x - c.r, c.y - c.r, c.r * 2, c.r * 2)) collectAt(c);
    }
    G.collectibles = G.collectibles.filter((c) => !c.taken && c.x + c.r > -20);

    for (const p of G.particles) { p.t += dt; p.vy += 520 * dt; p.x += p.vx * dt; p.y += p.vy * dt; }
    G.particles = G.particles.filter((p) => p.t < p.life);

    if (G.invuln <= 0) {
      const hb2 = duck.hitbox();
      for (const o of G.obstacles) { if (aabb(hb2.x, hb2.y, hb2.w, hb2.h, o.x, o.y, o.w, o.h)) { hitObstacle(); break; } }
    }
  },
  draw() { RENDER.world(); },
};

/* MUSIC: kurze, loopende Chiptune-Melodie (Square-Lead + Triangle-Bass).
   Eigener An/Aus-Schalter, unabhaengig vom SFX-Ton. Kindgerecht, ruhig. */
const MUSIC = {
  on: SAVE.get("dd_music", "0") === "1",
  step: 0, timer: null,
  // C-Dur, froehlich. 0 = Pause. Frequenzen in Hz.
  lead: [523,0,659,0, 784,0,659,0, 587,0,698,0, 880,0,784,0,
         523,0,659,0, 1047,0,784,0, 659,0,587,0, 523,0,0,0],
  bass: [131,0,0,0, 196,0,0,0, 175,0,0,0, 147,0,0,0,
         131,0,0,0, 165,0,0,0, 147,0,0,0, 131,0,0,0],
  tickMs: 150,
  start() {
    AUDIO.init();
    if (this.timer || !AUDIO.ctx) return;
    this.step = 0;
    const loop = () => {
      if (!this.on) { this.stop(); return; }
      const lf = this.lead[this.step % this.lead.length];
      const bf = this.bass[this.step % this.bass.length];
      if (lf && AUDIO.ctx && !AUDIO.muted) AUDIO.tone(lf, 0.14, "square", 0.05);
      if (bf && AUDIO.ctx && !AUDIO.muted) AUDIO.tone(bf, 0.18, "triangle", 0.06);
      this.step++;
      this.timer = setTimeout(loop, this.tickMs);
    };
    loop();
  },
  stop() { if (this.timer) { clearTimeout(this.timer); this.timer = null; } },
  toggle() {
    this.on = !this.on; SAVE.set("dd_music", this.on ? "1" : "0");
    if (this.on) this.start(); else this.stop();
  },
};
if (MUSIC.on) { window.addEventListener("pointerdown", () => MUSIC.start(), { once: true }); }

/* FX: CRT-Look (Scanlines + Vignette) und Retro-Szenenuebergaenge (Fade) */
const FX = {
  crt: SAVE.get("dd_crt", "1") === "1",
  toggleCRT() { this.crt = !this.crt; SAVE.set("dd_crt", this.crt ? "1" : "0"); },
  _vignette: null,
  trans: 0, transDur: 0.35,
  startTransition() { this.trans = this.transDur; },
  tick(dt) { if (this.trans > 0) this.trans -= dt; },
  vignette() {
    if (!this._vignette) {
      const g = screenCtx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, W * 0.62);
      g.addColorStop(0, "rgba(0,0,0,0)");
      g.addColorStop(1, "rgba(0,0,0,0.45)");
      this._vignette = g;
    }
    return this._vignette;
  },
  // wird in present() nach dem Hochskalieren auf den sichtbaren Canvas gelegt
  apply() {
    if (this.crt) {
      screenCtx.fillStyle = "rgba(0,0,0,0.14)";
      for (let y = 0; y < H; y += 3) screenCtx.fillRect(0, y, W, 1);
      screenCtx.fillStyle = "rgba(255,255,255,0.03)";
      screenCtx.fillRect(0, 0, W, H * 0.5);
      screenCtx.fillStyle = this.vignette();
      screenCtx.fillRect(0, 0, W, H);
    }
    if (this.trans > 0) {
      screenCtx.fillStyle = "rgba(8,9,14," + Math.max(0, this.trans / this.transDur) + ")";
      screenCtx.fillRect(0, 0, W, H);
    }
  },
};

    if (!downKeys.has("jump")) { downKeys.add("jump"); INPUT.requestJump(); }
    e.preventDefault();
  } else if (["arrowdown", "s"].includes(k)) {
    INPUT.startSlide(); e.preventDefault();
  } else if (k === "enter") {
    if (SCENES.current === State.MENU || SCENES.current === State.GAMEOVER || SCENES.current === State.WIN) startGame();
    else if (SCENES.current === State.STORY) beginLevel();
    else if (SCENES.current === State.PAUSE) SCENES.go(State.PLAY);
  } else if (k === "escape" || k === "p") {
    togglePause();
  }
});
window.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (["arrowup", "w", " ", "spacebar"].includes(k) || e.code === "Space") downKeys.delete("jump");
});
let touchStartY = null, swiped = false;
canvas.addEventListener("pointerdown", (e) => { touchStartY = e.clientY; swiped = false; });
canvas.addEventListener("pointermove", (e) => {
  if (touchStartY === null || swiped) return;
  if (e.clientY - touchStartY > 40) { INPUT.startSlide(); swiped = true; }
});
canvas.addEventListener("pointerup", () => { if (!swiped) INPUT.requestJump(); touchStartY = null; });

/* =========================================================================
   Game-Loop
   ========================================================================= */
let last = 0;
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05;
  if (!isFinite(dt) || dt < 0) dt = 0;
  SCENES.update(dt);
  FX.tick(dt);
  applyPixelTransform();
  SCENES.draw();
  present();
  // HUD scharf auf den Display-Canvas (volle Aufloesung), nur im Spiel/Pause
  if (SCENES.current === State.PLAY || SCENES.current === State.PAUSE) RENDER.hud();
  FX.apply();
  requestAnimationFrame(frame);
}
duck.reset();
SCENES.toggleOverlays();
requestAnimationFrame((tm) => { last = tm; requestAnimationFrame(frame); });

/* =========================================================================
   PWA: Service Worker
   ========================================================================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(() => {}); });
}
</script>
