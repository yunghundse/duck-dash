<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Duck Dash – Die Kicker-Ente auf WM-Tour</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1f2b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #stage {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 960px;
    aspect-ratio: 16 / 9;
  }
  #game {
    display: block;
    width: 100%; height: 100%;
    background: #2a3142;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    touch-action: none;
  }
  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    color: #eef1f5;
    padding: 4%;
  }
  .hidden { display: none !important; }
  h1 {
    font-size: clamp(28px, 7vw, 64px);
    font-weight: 800;
    letter-spacing: 1px;
    color: #f4d35e;
    text-shadow: 0 3px 0 rgba(0,0,0,0.25);
  }
  .subtitle {
    font-size: clamp(13px, 2.6vw, 22px);
    margin-top: 8px;
    color: #cdd5e0;
    font-weight: 500;
  }
  .big-score {
    font-size: clamp(20px, 4vw, 34px);
    font-weight: 700;
    color: #f4d35e;
    margin-top: 6px;
  }
  .btn {
    margin-top: clamp(20px, 4vh, 40px);
    padding: 14px 32px;
    font-size: clamp(15px, 2.8vw, 22px);
    font-weight: 700;
    color: #1a1f2b;
    background: #7cc47f;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 5px 0 #5a9d5d;
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #5a9d5d; }
  .hint {
    font-size: clamp(11px, 2.2vw, 15px);
    margin-top: 16px;
    color: #9aa6b5;
  }
  .flag {
    width: clamp(120px, 28vw, 200px);
    height: clamp(80px, 18vw, 130px);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    margin-bottom: 18px;
    display: flex;
  }
  .flag > div { flex: 1; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="960" height="540"></canvas>

  <div id="menu" class="overlay">
    <h1>Duck Dash</h1>
    <div class="subtitle">Die Kicker-Ente auf WM-Tour</div>
    <button id="startBtn" class="btn">Spiel starten</button>
    <div class="hint">Springen: Leertaste / ↑ / W / Tap &nbsp;·&nbsp; Ducken: ↓ / S / Wisch runter</div>
  </div>

  <div id="over" class="overlay hidden">
    <h1>Game Over</h1>
    <div class="subtitle">Score</div>
    <div id="finalScore" class="big-score">0</div>
    <button id="retryBtn" class="btn">Nochmal</button>
  </div>

  <div id="story" class="overlay hidden">
    <div id="storyFlag" class="flag"></div>
    <h1 id="storyCountry">Land</h1>
    <div id="storyText" class="subtitle">…</div>
    <button id="storyBtn" class="btn">Los!</button>
  </div>

  <div id="win" class="overlay hidden">
    <h1>🏆 Weltmeister!</h1>
    <div class="subtitle">Duck Dash gewonnen</div>
    <div id="winScore" class="big-score">0</div>
    <button id="winBtn" class="btn">Nochmal</button>
  </div>
</div>

<script>
"use strict";

// ---- Konstanten ----
const W = 960, H = 540;
const GROUND_Y = H - 96;

// Physik
const GRAVITY = 2600;          // px/s^2
const JUMP_V = -820;           // Absprung-Geschwindigkeit
const MAX_FALL = 1500;
const COYOTE_TIME = 0.10;      // s nach Kante noch springbar
const BUFFER_TIME = 0.12;      // s Input-Puffer vor Landung
const SLIDE_TIME = 0.55;       // s Dauer Slide

// Welt-Speed
const BASE_SPEED = 360;        // px/s
const SPEED_RAMP = 7;          // px/s pro Sekunde

// ---- Zustaende ----
const State = { MENU: "MENU", STORY: "STORY", PLAY: "PLAY", PAUSED: "PAUSED", OVER: "OVER", WIN: "WIN" };
let state = State.MENU;

// ---- WM-Etappen ----
// palette: sky-Verlauf [oben,unten], grass [oben,unten], accent (Tribuene/Linien)
// flag: 3 vertikale Streifen. goal: Strecke (px) bis zum naechsten Land.
const LEVELS = [
  { key: "br", country: "Brasilien", flag: ["#3a7d44", "#e6c84f", "#2f5d8a"],
    sky: ["#3f5a6b", "#6f917f"], grass: ["#5f8f5a", "#487045"], accent: "#3f6b46",
    story: "Anpfiff in Rio! Watschel ueber den Strand-Platz." },
  { key: "de", country: "Deutschland", flag: ["#2b2b2b", "#b23b3b", "#d9b64a"],
    sky: ["#43506b", "#7a8294"], grass: ["#5c8a57", "#456b42"], accent: "#555f6e",
    story: "Weiter nach Deutschland - praezises Timing zaehlt!" },
  { key: "jp", country: "Japan", flag: ["#e9e6e0", "#c75450", "#e9e6e0"],
    sky: ["#5a4f63", "#9a8a8f"], grass: ["#6a8f63", "#4f7049"], accent: "#7a6770",
    story: "Konnichiwa! In Japan wird's flink und flott." },
  { key: "us", country: "USA", flag: ["#3a4a7a", "#d9dde3", "#b23b4a"],
    sky: ["#414a63", "#74809a"], grass: ["#5f8f5a", "#487045"], accent: "#4a5570",
    story: "Big Game in den USA - volle Tribuenen!" },
  { key: "ar", country: "Argentinien", flag: ["#6fa3c7", "#eef1f5", "#6fa3c7"],
    sky: ["#48586b", "#8aa0b0"], grass: ["#5c8a57", "#456b42"], accent: "#5a7689",
    story: "Halbfinale in Argentinien - die Menge tobt!" },
  { key: "fin", country: "WM-Finale", flag: ["#b8922e", "#e6c84f", "#b8922e"],
    sky: ["#3a3550", "#6b5f7a"], grass: ["#5f8f5a", "#487045"], accent: "#7a6a3a",
    story: "Das grosse Finale! Watschel zum Pokal." },
];
const LEVEL_GOAL = 2200;   // px Strecke pro Etappe
let levelIndex = 0;
let levelDist = 0;
let bgScroll = 0;

// ---- Canvas ----
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ---- Overlays ----
const menuEl = document.getElementById("menu");
const overEl = document.getElementById("over");
const storyEl = document.getElementById("story");
const winEl = document.getElementById("win");
const startBtn = document.getElementById("startBtn");
const retryBtn = document.getElementById("retryBtn");
const finalScoreEl = document.getElementById("finalScore");
const winScoreEl = document.getElementById("winScore");
const winBtn = document.getElementById("winBtn");
const storyBtn = document.getElementById("storyBtn");
const storyFlagEl = document.getElementById("storyFlag");
const storyCountryEl = document.getElementById("storyCountry");
const storyTextEl = document.getElementById("storyText");

// ---- Spielzustand ----
const duck = {
  x: 150, y: 0, w: 58, h: 52,
  vy: 0,
  onGround: true,
  jumps: 0,            // genutzte Spruenge seit letztem Bodenkontakt
  coyote: 0,           // verbleibende Coyote-Zeit
  buffer: 0,           // verbleibender Sprung-Puffer
  sliding: false,
  slideT: 0,
};
let speed = BASE_SPEED;
let distance = 0;      // fuer Speed-Ramp
let score = 0;
let obstacles = [];
let spawnTimer = 0;
let runTime = 0;

// Leben / Treffer
const MAX_LIVES = 3;
const INVULN_TIME = 1.4;   // s Unverwundbarkeit nach Treffer
let lives = MAX_LIVES;
let invuln = 0;
let balls = 0;             // gesammelte Baelle (spaeter)
let shake = 0;             // Screenshake-Restzeit

// Bestwert
let best = 0;
try { best = parseInt(localStorage.getItem("dd_best") || "0", 10) || 0; } catch (e) {}
function saveBest() {
  if (Math.floor(score) > best) {
    best = Math.floor(score);
    try { localStorage.setItem("dd_best", String(best)); } catch (e) {}
  }
}

// ---- State-Handling ----
function setState(next) {
  state = next;
  menuEl.classList.toggle("hidden", state !== State.MENU);
  overEl.classList.toggle("hidden", state !== State.OVER);
  storyEl.classList.toggle("hidden", state !== State.STORY);
  winEl.classList.toggle("hidden", state !== State.WIN);
}

function showStory(idx) {
  const lv = LEVELS[idx];
  storyFlagEl.innerHTML =
    '<div style="background:' + lv.flag[0] + '"></div>' +
    '<div style="background:' + lv.flag[1] + '"></div>' +
    '<div style="background:' + lv.flag[2] + '"></div>';
  storyCountryEl.textContent = lv.country;
  storyTextEl.textContent = lv.story;
  setState(State.STORY);
}

function resetGame() {
  duck.y = GROUND_Y - duck.h;
  duck.vy = 0;
  duck.onGround = true;
  duck.jumps = 0;
  duck.coyote = 0;
  duck.buffer = 0;
  duck.sliding = false;
  duck.slideT = 0;
  speed = BASE_SPEED;
  distance = 0;
  score = 0;
  obstacles = [];
  spawnTimer = 0.8;
  runTime = 0;
  lives = MAX_LIVES;
  invuln = 0;
  balls = 0;
  shake = 0;
  levelIndex = 0;
  levelDist = 0;
  bgScroll = 0;
}

function startGame() { resetGame(); showStory(0); }

function beginLevel() { setState(State.PLAY); }

function advanceLevel() {
  if (levelIndex >= LEVELS.length - 1) {
    saveBest();
    winScoreEl.textContent = Math.floor(score);
    setState(State.WIN);
    return;
  }
  levelIndex++;
  levelDist = 0;
  score += 100; // Etappen-Bonus
  showStory(levelIndex);
}

function hitObstacle() {
  if (invuln > 0) return;
  lives--;
  invuln = INVULN_TIME;
  shake = 0.35;
  if (lives <= 0) gameOver();
}

function gameOver() {
  saveBest();
  finalScoreEl.textContent = Math.floor(score);
  setState(State.OVER);
}

startBtn.addEventListener("click", startGame);
retryBtn.addEventListener("click", startGame);
winBtn.addEventListener("click", startGame);
storyBtn.addEventListener("click", beginLevel);

// ---- Eingabe ----
function requestJump() {
  if (state !== State.PLAY) return;
  duck.buffer = BUFFER_TIME;
}
function tryConsumeJump() {
  if (duck.buffer <= 0) return;
  const canFirst = duck.onGround || duck.coyote > 0;
  if (canFirst) {
    duck.vy = JUMP_V;
    duck.onGround = false;
    duck.coyote = 0;
    duck.jumps = 1;
    duck.buffer = 0;
    endSlide();
  } else if (duck.jumps < 2) {
    // Doppelsprung
    duck.vy = JUMP_V * 0.92;
    duck.jumps = 2;
    duck.buffer = 0;
    endSlide();
  }
}
function startSlide() {
  if (state !== State.PLAY) return;
  if (!duck.onGround) {
    // in der Luft: schnelles Runterziehen, Slide beginnt bei Landung
    duck.vy = Math.max(duck.vy, 600);
  }
  duck.sliding = true;
  duck.slideT = SLIDE_TIME;
}
function endSlide() { duck.sliding = false; duck.slideT = 0; }

// Tastatur
const downKeys = new Set();
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (["arrowup", "w", " ", "spacebar"].includes(k) || e.code === "Space") {
    if (!downKeys.has("jump")) { downKeys.add("jump"); requestJump(); }
    e.preventDefault();
  } else if (["arrowdown", "s"].includes(k)) {
    startSlide();
    e.preventDefault();
  } else if (k === "enter") {
    if (state === State.MENU || state === State.OVER || state === State.WIN) startGame();
    else if (state === State.STORY) beginLevel();
  }
});
window.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (["arrowup", "w", " ", "spacebar"].includes(k) || e.code === "Space") {
    downKeys.delete("jump");
  }
});

// Pointer (Klick / Tap / Wisch)
let touchStartY = null, touchStartX = null, swiped = false;
canvas.addEventListener("pointerdown", (e) => {
  touchStartY = e.clientY; touchStartX = e.clientX; swiped = false;
});
canvas.addEventListener("pointermove", (e) => {
  if (touchStartY === null || swiped) return;
  if (e.clientY - touchStartY > 40) { startSlide(); swiped = true; }
});
canvas.addEventListener("pointerup", (e) => {
  if (!swiped) requestJump();
  touchStartY = null;
});

// ---- Hindernisse ----
// type: "high" (ueberspringen), "low" (Bande -> slide), "cone" (Huetchen, niedrig)
function spawnObstacle() {
  const r = Math.random();
  let o;
  if (r < 0.42) {
    // hohes Hindernis (Tor-Pfosten/Abwehr) - Doppelsprung-knapp
    const h = 78 + Math.random() * 46;     // 78..124
    o = { type: "high", w: 40 + Math.random() * 26, h, x: W + 40, y: GROUND_Y - h, passed: false };
  } else if (r < 0.75) {
    // tiefe Bande (Hindernis oben -> drunter durchsliden)
    // gap < Stehhoehe (~48) erzwingt Slide, >= Slidehoehe (26) bleibt fair schaffbar
    const gap = 40;                        // freier Slide-Korridor am Boden
    const h = 150;
    o = { type: "low", w: 60 + Math.random() * 30, h, x: W + 40, y: GROUND_Y - gap - h, passed: false };
  } else {
    // Huetchen-Reihe (niedrig, einfacher Sprung)
    const h = 40 + Math.random() * 18;
    o = { type: "cone", w: 36, h, x: W + 40, y: GROUND_Y - h, passed: false };
  }
  obstacles.push(o);
}

function nextSpawnDelay() {
  // Abstand schrumpft mit Tempo, bleibt aber fair schaffbar
  const t = speed / BASE_SPEED;
  const base = 1.15 / t;
  return base + Math.random() * 0.55 / t;
}

// ---- Update ----
function update(dt) {
  if (state !== State.PLAY) return;

  runTime += dt;
  distance += speed * dt;
  levelDist += speed * dt;
  bgScroll += speed * dt;
  speed = BASE_SPEED + runTime * SPEED_RAMP * 6;
  if (speed > 760) speed = 760;

  // Etappen-Ziel erreicht?
  if (levelDist >= LEVEL_GOAL) {
    advanceLevel();
    return;
  }

  score += dt * (speed / 36);

  // Timer
  if (duck.coyote > 0) duck.coyote -= dt;
  if (duck.buffer > 0) duck.buffer -= dt;
  if (invuln > 0) invuln -= dt;
  if (shake > 0) shake -= dt;

  // Slide-Dauer
  if (duck.sliding) {
    duck.slideT -= dt;
    if (duck.slideT <= 0) endSlide();
  }

  // Sprung-Buffer einloesen
  tryConsumeJump();

  // Physik
  const wasGround = duck.onGround;
  duck.vy += GRAVITY * dt;
  if (duck.vy > MAX_FALL) duck.vy = MAX_FALL;
  duck.y += duck.vy * dt;

  const floor = GROUND_Y - duck.h;
  if (duck.y >= floor) {
    duck.y = floor;
    if (!wasGround) { duck.jumps = 0; }
    duck.onGround = true;
    duck.vy = 0;
  } else {
    if (wasGround) duck.coyote = COYOTE_TIME; // gerade Kante verlassen
    duck.onGround = false;
  }

  // Spawnen
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = nextSpawnDelay();
  }

  // Hindernisse bewegen
  for (const o of obstacles) {
    o.x -= speed * dt;
    if (!o.passed && o.x + o.w < duck.x) { o.passed = true; score += 10; }
  }
  obstacles = obstacles.filter((o) => o.x + o.w > -20);

  // Kollision (AABB) mit aktueller Hitbox
  if (invuln <= 0) {
    const hb = duckHitbox();
    for (const o of obstacles) {
      if (aabb(hb.x, hb.y, hb.w, hb.h, o.x, o.y, o.w, o.h)) {
        hitObstacle();
        break;
      }
    }
  }
}

function duckHitbox() {
  // Beim Sliden flachere, niedrigere Hitbox
  if (duck.sliding && duck.onGround) {
    const h = duck.h * 0.5;
    return { x: duck.x + 4, y: GROUND_Y - h, w: duck.w - 6, h };
  }
  return { x: duck.x + 6, y: duck.y + 4, w: duck.w - 12, h: duck.h - 6 };
}

function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ---- Render ----
function drawBackground() {
  const lv = LEVELS[levelIndex] || LEVELS[0];

  // Himmel
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, lv.sky[0]);
  sky.addColorStop(1, lv.sky[1]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Parallax-Schicht 1: Tribuene (langsam)
  const tribY = GROUND_Y - 150;
  const s1 = (bgScroll * 0.15) % 80;
  ctx.fillStyle = lv.accent;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(0, tribY + 40);
  ctx.lineTo(W, tribY);
  ctx.lineTo(W, GROUND_Y);
  ctx.closePath();
  ctx.fill();
  // Zuschauer-Punkte (gedaempft)
  ctx.globalAlpha = 0.5;
  for (let row = 0; row < 3; row++) {
    for (let x = -s1; x < W; x += 26) {
      ctx.fillStyle = (x + row) % 3 === 0 ? "#cdd5e0" : (row % 2 ? "#e0b97a" : "#b89a86");
      ctx.fillRect(x, tribY + 12 + row * 24 - (x / W) * 20, 7, 7);
    }
  }
  ctx.globalAlpha = 1;

  // Parallax-Schicht 2: Bandenwerbung "WM 2026" (mittel)
  const bandY = GROUND_Y - 46;
  ctx.fillStyle = "#222732";
  ctx.fillRect(0, bandY, W, 30);
  const s2 = (bgScroll * 0.5) % 240;
  ctx.font = "700 18px -apple-system, sans-serif";
  ctx.textAlign = "left";
  for (let x = -s2; x < W + 240; x += 240) {
    ctx.fillStyle = lv.flag[1];
    ctx.fillText("WM 2026", x + 20, bandY + 21);
  }

  // Spielfeld
  const grass = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grass.addColorStop(0, lv.grass[0]);
  grass.addColorStop(1, lv.grass[1]);
  ctx.fillStyle = grass;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Spielfeldlinien (scrollen)
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 3;
  const s3 = (bgScroll * 1.0) % 160;
  for (let x = -s3; x < W; x += 160) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 6);
    ctx.lineTo(x, H);
    ctx.stroke();
  }

  ctx.fillStyle = lv.accent;
  ctx.fillRect(0, GROUND_Y, W, 4);
}

function drawDuck() {
  const sliding = duck.sliding && duck.onGround;
  let bx = duck.x, by = duck.y, bw = duck.w, bh = duck.h;
  if (sliding) { bh = duck.h * 0.6; by = GROUND_Y - bh; bw = duck.w + 8; }

  ctx.save();
  ctx.translate(bx, by);

  // Schatten
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.beginPath();
  ctx.ellipse(bw * 0.5, GROUND_Y - by + 6, bw * 0.42, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Koerper
  ctx.fillStyle = "#f2c14e";
  roundRect(2, 6, bw - 4, bh - 6, 16);
  ctx.fill();

  // Schwanz
  ctx.fillStyle = "#e3ad38";
  ctx.beginPath();
  ctx.moveTo(2, bh * 0.45);
  ctx.lineTo(-10, bh * 0.30);
  ctx.lineTo(2, bh * 0.62);
  ctx.closePath();
  ctx.fill();

  // Fluegel
  ctx.fillStyle = "#e6b33e";
  ctx.beginPath();
  ctx.ellipse(bw * 0.46, bh * 0.62, bw * 0.22, bh * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Kopf (oben rechts)
  const headX = bw * 0.72, headY = bh * 0.30, headR = bw * 0.26;
  ctx.fillStyle = "#f2c14e";
  ctx.beginPath();
  ctx.arc(headX, headY, headR, 0, Math.PI * 2);
  ctx.fill();

  // Auge
  ctx.fillStyle = "#1d2330";
  ctx.beginPath();
  ctx.arc(headX + headR * 0.25, headY - headR * 0.15, 3.2, 0, Math.PI * 2);
  ctx.fill();

  // Schnabel (orange)
  ctx.fillStyle = "#e8852b";
  ctx.beginPath();
  ctx.moveTo(headX + headR * 0.7, headY);
  ctx.lineTo(headX + headR * 1.5, headY + 4);
  ctx.lineTo(headX + headR * 0.7, headY + 11);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  if (o.type === "high") {
    // Abwehr-Pylon (dunkelrot, gedaempft)
    ctx.fillStyle = "#a85a4f";
    roundRectAbs(o.x, o.y, o.w, o.h, 6);
    ctx.fill();
    ctx.fillStyle = "#8f4a40";
    ctx.fillRect(o.x, o.y + o.h * 0.4, o.w, 6);
  } else if (o.type === "low") {
    // haengende Bande (Banner oben)
    ctx.fillStyle = "#5d6b8a";
    roundRectAbs(o.x, o.y, o.w, o.h, 6);
    ctx.fill();
    ctx.fillStyle = "#48557030";
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.fillStyle = "#cdd5e0";
    ctx.fillRect(o.x + 4, o.y + o.h - 10, o.w - 8, 4);
  } else {
    // Huetchen (orange, gedaempft)
    ctx.fillStyle = "#d98a3d";
    ctx.beginPath();
    ctx.moveTo(o.x + o.w * 0.5, o.y);
    ctx.lineTo(o.x + o.w, o.y + o.h);
    ctx.lineTo(o.x, o.y + o.h);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#eaddc7";
    ctx.fillRect(o.x, o.y + o.h - 6, o.w, 6);
  }
  ctx.restore();
}

function drawHeart(x, y, s, filled) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(0, 0, -s * 0.5, 0, -s * 0.5, s * 0.35);
  ctx.bezierCurveTo(-s * 0.5, s * 0.65, 0, s * 0.85, 0, s);
  ctx.bezierCurveTo(0, s * 0.85, s * 0.5, s * 0.65, s * 0.5, s * 0.35);
  ctx.bezierCurveTo(s * 0.5, 0, 0, 0, 0, s * 0.3);
  ctx.closePath();
  ctx.fillStyle = filled ? "#d96a6a" : "rgba(255,255,255,0.18)";
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  // Score + Bestwert rechts
  ctx.fillStyle = "#eef1f5";
  ctx.font = "700 26px -apple-system, sans-serif";
  ctx.textAlign = "right";
  ctx.fillText(String(Math.floor(score)).padStart(5, "0"), W - 20, 38);
  ctx.font = "600 14px -apple-system, sans-serif";
  ctx.fillStyle = "#aeb8c6";
  ctx.fillText("Best " + best, W - 20, 58);
  ctx.fillText("⚽ " + balls + "   " + Math.floor(distance / 10) + " m", W - 20, 78);

  // Herzen links
  for (let i = 0; i < MAX_LIVES; i++) {
    drawHeart(28 + i * 30, 22, 18, i < lives);
  }

  // Etappen-Fortschritt (Mitte oben)
  const lv = LEVELS[levelIndex] || LEVELS[0];
  const bw = 200, bx = (W - bw) / 2, by = 24;
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(bx, by, bw, 8);
  ctx.fillStyle = lv.flag[1];
  ctx.fillRect(bx, by, bw * Math.min(1, levelDist / LEVEL_GOAL), 8);
  ctx.fillStyle = "#dfe5ee";
  ctx.font = "600 14px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(lv.country, W / 2, by - 6);
  ctx.textAlign = "left";
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function roundRectAbs(x, y, w, h, r) { roundRect(x, y, w, h, r); }

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake > 0) {
    const m = shake * 18;
    ctx.translate((Math.sin(runTime * 90) * m), (Math.cos(runTime * 110) * m));
  }
  drawBackground();
  for (const o of obstacles) drawObstacle(o);
  // bei Unverwundbarkeit blinkt die Ente
  if (state === State.PLAY || state === State.OVER) {
    if (!(invuln > 0 && Math.floor(runTime * 12) % 2 === 0)) drawDuck();
  }
  ctx.restore();
  if (state === State.PLAY) drawHUD();
}

// ---- Game-Loop ----
let last = 0;
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;
  if (!isFinite(dt) || dt < 0) dt = 0;

  update(dt);
  render();
  requestAnimationFrame(frame);
}

// Anfangsposition fuer Menue-Render
duck.y = GROUND_Y - duck.h;
requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
</script>
