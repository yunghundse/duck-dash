// ---- Sound (WebAudio) ----
let muted = false;
try { muted = localStorage.getItem("dd_muted") === "1"; } catch (e) {}
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
// tone: freq, dur, type, vol, glideTo
function tone(freq, dur, type, vol, glideTo) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, t);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t + dur);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(vol || 0.18, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.02);
}
function seq(notes) { // [[freq,delay,dur,type], ...]
  if (muted || !audioCtx) return;
  notes.forEach(([f, d, dur, ty]) => setTimeout(() => tone(f, dur || 0.12, ty || "triangle", 0.16), d));
}
const SFX = {

  trophy: () => seq([[660,0,0.12],[880,90,0.12],[1180,180,0.18]]),
  hit:    () => tone(200, 0.22, "sawtooth", 0.16, 90),
  levelup:() => seq([[523,0,0.12],[659,110,0.12],[784,220,0.2]]),

  win:    () => seq([[523,0,0.14],[659,130,0.14],[784,260,0.14],[1046,400,0.32]]),
};

const Store = {
  coins: 0, owned: ["classic"], skin: "classic", active: [],
  load() {
    try {
      this.coins = parseInt(localStorage.getItem("dd_coins") || "0", 10) || 0;
      this.owned = JSON.parse(localStorage.getItem("dd_owned") || '["classic"]');
      this.skin = localStorage.getItem("dd_skin") || "classic";
      this.active = JSON.parse(localStorage.getItem("dd_active") || "[]");
    } catch (e) {}
    if (!this.owned.includes("classic")) this.owned.push("classic");
  },
  save() {
    try {
      localStorage.setItem("dd_coins", String(this.coins));
      localStorage.setItem("dd_owned", JSON.stringify(this.owned));
      localStorage.setItem("dd_skin", this.skin);
      localStorage.setItem("dd_active", JSON.stringify(this.active));
    } catch (e) {}
  },
  addCoins(n) { this.coins += n; this.save(); },
  has(id) { return this.owned.includes(id); },
  buy(item) {
    if (this.has(item.id) || this.coins < item.price) return false;
    this.coins -= item.price; this.owned.push(item.id); this.save(); return true;

  equipSkin(id) { if (this.has(id)) { this.skin = id; this.save(); } },
  togglePower(id) {
    if (!this.has(id)) return;
    const i = this.active.indexOf(id);
    if (i >= 0) this.active.splice(i, 1); else this.active.push(id);
    this.save();
  },
  isActive(id) { return this.active.includes(id); },
  currentSkin() { return SKINS.find((s) => s.id === this.skin) || SKINS[0]; },
};
Store.load();

// ---- State-Handling ----
function setState(next) {
  state = next;
  menuEl.classList.toggle("hidden", state !== State.MENU);
  overEl.classList.toggle("hidden", state !== State.OVER);
  storyEl.classList.toggle("hidden", state !== State.STORY);
  winEl.classList.toggle("hidden", state !== State.WIN);
  shopEl.classList.toggle("hidden", state !== State.SHOP);
}

function showStory(idx) {
  const lv = LEVELS[idx];
  storyFlagEl.innerHTML =
    '<div style="background:' + lv.flag[0] + '"></div>' +
    '<div style="background:' + lv.flag[1] + '"></div>' +
    '<div style="background:' + lv.flag[2] + '"></div>';
  storyCountryEl.textContent = tCountry(lv.key);
  storyTextEl.textContent = tStory(lv.key);
  setState(State.STORY);
}

function resetGame() {
  duck.y = GROUND_Y - duck.h;
  duck.vy = 0;
  duck.onGround = true;
  duck.jumps = 0;
  duck.coyote = 0;
  duck.buffer = 0;
  duck.sliding = false;
  duck.slideT = 0;
  speed = BASE_SPEED;
  distance = 0;
  score = 0;
  obstacles = [];
  collectibles = [];
  particles = [];
  collectTimer = 1.0;
  spawnTimer = 0.8;
  runTime = 0;
  lives = MAX_LIVES;
  invuln = 0;
  balls = 0;
  shake = 0;
  levelIndex = 0;
  levelDist = 0;
  bgScroll = 0;
  // Power-ups anwenden
  scoreMult = Store.isActive("double") ? 2 : 1;
  magnetOn = Store.isActive("magnet");
  shieldUp = Store.isActive("shield");
  if (Store.isActive("extralife")) lives = MAX_LIVES + 1;
  if (Store.isActive("boost")) speed = BASE_SPEED * 1.15;
}

function startGame() { initAudio(); resetGame(); showStory(0); }

// ---- Partikel ----
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 180;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 0.5 + Math.random() * 0.4, t: 0, color, r: 2 + Math.random() * 3,
    });
  }
}

function beginLevel() { setState(State.PLAY); }

function advanceLevel() {
  if (levelIndex >= LEVELS.length - 1) {
    saveBest();
    Store.addCoins(balls);
    SFX.win();
    winScoreEl.textContent = Math.floor(score);
    setState(State.WIN);
    return;
  }
  levelIndex++;
  levelDist = 0;
  score += 100; // Etappen-Bonus
  SFX.levelup();
  showStory(levelIndex);
}

function hitObstacle() {
  if (invuln > 0) return;
  if (shieldUp) {
    shieldUp = false; invuln = INVULN_TIME; shake = 0.25;
    burst(duck.x + duck.w / 2, duck.y + duck.h / 2, "#6fa3c7", 16);
    SFX.hit();
    return;
  }
  lives--;
  invuln = INVULN_TIME;
  shake = 0.35;
  burst(duck.x + duck.w / 2, duck.y + duck.h / 2, "#d9b64a", 14);
  if (lives <= 0) { SFX.over(); gameOver(); }
  else SFX.hit();
}

function gameOver() {
  saveBest();
  Store.addCoins(balls);
  finalScoreEl.textContent = Math.floor(score);
  setState(State.OVER);
}

// ---- Eingabe ----
function requestJump() {
  if (state !== State.PLAY) return;
  duck.buffer = BUFFER_TIME;
}
function tryConsumeJump() {
  if (duck.buffer <= 0) return;
  const canFirst = duck.onGround || duck.coyote > 0;
  if (canFirst) {
    duck.vy = JUMP_V;
    duck.onGround = false;
    duck.coyote = 0;
    duck.jumps = 1;
    duck.buffer = 0;
    endSlide();
    SFX.jump();
  } else if (duck.jumps < 2) {
    // Doppelsprung
    duck.vy = JUMP_V * 0.92;
    duck.jumps = 2;
    duck.buffer = 0;
    endSlide();
    SFX.jump();
  }
}
function startSlide() {
  if (state !== State.PLAY) return;
  if (!duck.onGround) {
    // in der Luft: schnelles Runterziehen, Slide beginnt bei Landung
    duck.vy = Math.max(duck.vy, 600);
  }
  duck.sliding = true;
  duck.slideT = SLIDE_TIME;
}
function endSlide() { duck.sliding = false; duck.slideT = 0; }

// Tastatur
const downKeys = new Set();
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (["arrowup", "w", " ", "spacebar"].includes(k) || e.code === "Space") {
    if (!downKeys.has("jump")) { downKeys.add("jump"); requestJump(); }
    e.preventDefault();
  } else if (["arrowdown", "s"].includes(k)) {
    startSlide();
    e.preventDefault();
  } else if (k === "enter") {
    if (state === State.MENU || state === State.OVER || state === State.WIN) startGame();
    else if (state === State.STORY) beginLevel();
  }
});
window.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (["arrowup", "w", " ", "spacebar"].includes(k) || e.code === "Space") {
    downKeys.delete("jump");
  }
});

// Pointer (Klick / Tap / Wisch)
let touchStartY = null, touchStartX = null, swiped = false;
canvas.addEventListener("pointerdown", (e) => {
  touchStartY = e.clientY; touchStartX = e.clientX; swiped = false;
});
canvas.addEventListener("pointermove", (e) => {
  if (touchStartY === null || swiped) return;
  if (e.clientY - touchStartY > 40) { startSlide(); swiped = true; }
});
canvas.addEventListener("pointerup", (e) => {
  if (!swiped) requestJump();
  touchStartY = null;
});

// ---- Hindernisse ----
// type: "high" (ueberspringen), "low" (Bande -> slide), "cone" (Huetchen, niedrig)
function spawnObstacle() {
  const r = Math.random();
  let o;
  if (r < 0.42) {
    // hohes Hindernis (Tor-Pfosten/Abwehr) - Doppelsprung-knapp
    const h = 78 + Math.random() * 46;     // 78..124
    o = { type: "high", w: 40 + Math.random() * 26, h, x: W + 40, y: GROUND_Y - h, passed: false };
  } else if (r < 0.75) {
    // tiefe Bande (Hindernis oben -> drunter durchsliden)
    // gap < Stehhoehe (~48) erzwingt Slide, >= Slidehoehe (26) bleibt fair schaffbar
    const gap = 40;                        // freier Slide-Korridor am Boden
    const h = 150;
    o = { type: "low", w: 60 + Math.random() * 30, h, x: W + 40, y: GROUND_Y - gap - h, passed: false };
  } else {
    // Huetchen-Reihe (niedrig, einfacher Sprung)
    const h = 40 + Math.random() * 18;
    o = { type: "cone", w: 36, h, x: W + 40, y: GROUND_Y - h, passed: false };
  }
  obstacles.push(o);
}

function nextSpawnDelay() {
  // Abstand schrumpft mit Tempo, bleibt aber fair schaffbar
  const t = speed / BASE_SPEED;
  const base = 1.15 / t;
  return base + Math.random() * 0.55 / t;
}

// Collectibles: Fussball (haeufig) oder goldener Pokal (selten)
function spawnCollectible() {
  const trophy = Math.random() < 0.06;
  const heights = [70, 120, 180, 240];
  const yOff = heights[Math.floor(Math.random() * heights.length)];
  const size = trophy ? 30 : 22;
  collectibles.push({
    type: trophy ? "trophy" : "ball",
    x: W + 30, y: GROUND_Y - yOff, r: size / 2, size,
    bob: Math.random() * Math.PI * 2, taken: false,
  });
}

function collectAt(o) {
  o.taken = true;
  if (o.type === "trophy") {
    score += 200; balls += 5;
    burst(o.x, o.y, "#f0d061", 22);
    SFX.trophy();
  } else {
    score += 5; balls += 1;
    burst(o.x, o.y, "#dfe5ee", 10);
    SFX.coin();
  }
}

// ---- Update ----
function update(dt) {
  if (state !== State.PLAY) return;

  runTime += dt;
  distance += speed * dt;
  levelDist += speed * dt;
  bgScroll += speed * dt;
  speed = BASE_SPEED + runTime * SPEED_RAMP * 6;
  if (speed > 760) speed = 760;

  // Etappen-Ziel erreicht?
  if (levelDist >= LEVEL_GOAL) {
    advanceLevel();
    return;
  }

  score += dt * (speed / 36) * scoreMult;

  // Timer
  if (duck.coyote > 0) duck.coyote -= dt;
  if (duck.buffer > 0) duck.buffer -= dt;
  if (invuln > 0) invuln -= dt;
  if (shake > 0) shake -= dt;

  // Slide-Dauer
  if (duck.sliding) {
    duck.slideT -= dt;
    if (duck.slideT <= 0) endSlide();
  }

  // Sprung-Buffer einloesen
  tryConsumeJump();

  // Physik
  const wasGround = duck.onGround;
  duck.vy += GRAVITY * dt;
  if (duck.vy > MAX_FALL) duck.vy = MAX_FALL;
  duck.y += duck.vy * dt;

  const floor = GROUND_Y - duck.h;
  if (duck.y >= floor) {
    duck.y = floor;
    if (!wasGround) { duck.jumps = 0; }
    duck.onGround = true;
    duck.vy = 0;
  } else {
    if (wasGround) duck.coyote = COYOTE_TIME; // gerade Kante verlassen
    duck.onGround = false;
  }

  // Spawnen
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = nextSpawnDelay();
  }

  // Hindernisse bewegen
  for (const o of obstacles) {
    o.x -= speed * dt;
    if (!o.passed && o.x + o.w < duck.x) { o.passed = true; score += 10; }
  }
  obstacles = obstacles.filter((o) => o.x + o.w > -20);

  // Collectibles spawnen + bewegen + einsammeln
  collectTimer -= dt;
  if (collectTimer <= 0) {
    spawnCollectible();
    collectTimer = 0.8 + Math.random() * 1.0;
  }
  const hb = duckHitbox();
  const dcx = duck.x + duck.w / 2, dcy = duck.y + duck.h / 2;
  for (const c of collectibles) {
    c.x -= speed * dt;
    c.bob += dt * 4;
    // Muenz-Magnet: zieht nahe Baelle an
    if (magnetOn && !c.taken) {
      const dx = dcx - c.x, dy = dcy - c.y;
      const d = Math.hypot(dx, dy);
      if (d < 200 && d > 1) { c.x += (dx / d) * 320 * dt; c.y += (dy / d) * 320 * dt; }
    }
    if (!c.taken && aabb(hb.x, hb.y, hb.w, hb.h, c.x - c.r, c.y - c.r, c.r * 2, c.r * 2)) {
      collectAt(c);
    }
  }
  collectibles = collectibles.filter((c) => !c.taken && c.x + c.r > -20);

  // Partikel
  for (const p of particles) {
    p.t += dt;
    p.vy += 520 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
  particles = particles.filter((p) => p.t < p.life);

  // Kollision (AABB) mit aktueller Hitbox
  if (invuln <= 0) {
    const hb = duckHitbox();
    for (const o of obstacles) {
      if (aabb(hb.x, hb.y, hb.w, hb.h, o.x, o.y, o.w, o.h)) {
        hitObstacle();
        break;
      }
    }
  }
}

function duckHitbox() {
  // Beim Sliden flachere, niedrigere Hitbox
  if (duck.sliding && duck.onGround) {
    const h = duck.h * 0.5;
    return { x: duck.x + 4, y: GROUND_Y - h, w: duck.w - 6, h };
  }
  return { x: duck.x + 6, y: duck.y + 4, w: duck.w - 12, h: duck.h - 6 };
}

function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ---- Render ----
function drawBackground() {
  const lv = LEVELS[levelIndex] || LEVELS[0];

  // Himmel
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, lv.sky[0]);
  sky.addColorStop(1, lv.sky[1]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Parallax-Schicht 1: Tribuene (langsam)
  const tribY = GROUND_Y - 150;
  const s1 = (bgScroll * 0.15) % 80;
  ctx.fillStyle = lv.accent;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(0, tribY + 40);
  ctx.lineTo(W, tribY);
  ctx.lineTo(W, GROUND_Y);
  ctx.closePath();
  ctx.fill();
  // Zuschauer-Punkte (gedaempft)
  ctx.globalAlpha = 0.5;
  for (let row = 0; row < 3; row++) {
    for (let x = -s1; x < W; x += 26) {
      ctx.fillStyle = (x + row) % 3 === 0 ? "#cdd5e0" : (row % 2 ? "#e0b97a" : "#b89a86");
      ctx.fillRect(x, tribY + 12 + row * 24 - (x / W) * 20, 7, 7);
    }
  }
  ctx.globalAlpha = 1;

  // Parallax-Schicht 2: Bandenwerbung "WM 2026" (mittel)
  const bandY = GROUND_Y - 46;
  ctx.fillStyle = "#222732";
  ctx.fillRect(0, bandY, W, 30);
  const s2 = (bgScroll * 0.5) % 240;
  ctx.font = "700 18px -apple-system, sans-serif";
  ctx.textAlign = "left";
  for (let x = -s2; x < W + 240; x += 240) {
    ctx.fillStyle = lv.flag[1];
    ctx.fillText("WM 2026", x + 20, bandY + 21);
  }

  // Spielfeld
  const grass = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grass.addColorStop(0, lv.grass[0]);
  grass.addColorStop(1, lv.grass[1]);
  ctx.fillStyle = grass;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Spielfeldlinien (scrollen)
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 3;
  const s3 = (bgScroll * 1.0) % 160;
  for (let x = -s3; x < W; x += 160) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 6);
    ctx.lineTo(x, H);
    ctx.stroke();
  }

  ctx.fillStyle = lv.accent;
  ctx.fillRect(0, GROUND_Y, W, 4);
}

function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.max(0, Math.min(255, Math.round(r * f)));
  g = Math.max(0, Math.min(255, Math.round(g * f)));
  b = Math.max(0, Math.min(255, Math.round(b * f)));
  return "rgb(" + r + "," + g + "," + b + ")";
}

function drawDuck() {
  const sliding = duck.sliding && duck.onGround;
  let bx = duck.x, by = duck.y, bw = duck.w, bh = duck.h;
  if (sliding) { bh = duck.h * 0.6; by = GROUND_Y - bh; bw = duck.w + 8; }

  const skin = Store.currentSkin();
  const bodyCol = skin.body;
  const darkCol = shade(bodyCol, 0.85);
  const wingCol = shade(bodyCol, 0.92);

  ctx.save();
  ctx.translate(bx, by);

  // Schatten
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.beginPath();
  ctx.ellipse(bw * 0.5, GROUND_Y - by + 6, bw * 0.42, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Schild-Aura
  if (shieldUp) {
    ctx.strokeStyle = "rgba(111,163,199,0.8)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(bw * 0.5, bh * 0.5, bw * 0.7, bh * 0.8, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Koerper
  ctx.fillStyle = bodyCol;
  roundRect(2, 6, bw - 4, bh - 6, 16);
  ctx.fill();
  if (skin.golden) { // Glanz
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    roundRect(6, 9, bw * 0.4, bh * 0.3, 8); ctx.fill();
  }

  // Schwanz
  ctx.fillStyle = darkCol;
  ctx.beginPath();
  ctx.moveTo(2, bh * 0.45);
  ctx.lineTo(-10, bh * 0.30);
  ctx.lineTo(2, bh * 0.62);
  ctx.closePath();
  ctx.fill();

  // Fluegel
  ctx.fillStyle = wingCol;
  ctx.beginPath();
  ctx.ellipse(bw * 0.46, bh * 0.62, bw * 0.22, bh * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Kopf (oben rechts)
  const headX = bw * 0.72, headY = bh * 0.30, headR = bw * 0.26;
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.arc(headX, headY, headR, 0, Math.PI * 2);
  ctx.fill();

  // Brille
  if (skin.glasses) {
    ctx.fillStyle = "#1d2330";
    ctx.fillRect(headX - headR * 0.1, headY - headR * 0.3, headR * 0.7, headR * 0.32);
    ctx.fillRect(headX + headR * 0.65, headY - headR * 0.22, headR * 0.5, headR * 0.22);
  } else {
    // Auge
    ctx.fillStyle = "#1d2330";
    ctx.beginPath();
    ctx.arc(headX + headR * 0.25, headY - headR * 0.15, 3.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hut
  if (skin.hat) {
    ctx.fillStyle = "#34506e";
    ctx.fillRect(headX - headR * 0.6, headY - headR * 0.95, headR * 1.5, headR * 0.4);
    ctx.fillRect(headX - headR * 0.3, headY - headR * 1.4, headR * 0.9, headR * 0.55);
  }

  // Schnabel (orange)
  ctx.fillStyle = "#e8852b";
  ctx.beginPath();
  ctx.moveTo(headX + headR * 0.7, headY);
  ctx.lineTo(headX + headR * 1.5, headY + 4);
  ctx.lineTo(headX + headR * 0.7, headY + 11);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  if (o.type === "high") {
    // Abwehr-Pylon (dunkelrot, gedaempft)
    ctx.fillStyle = "#a85a4f";
    roundRectAbs(o.x, o.y, o.w, o.h, 6);
    ctx.fill();
    ctx.fillStyle = "#8f4a40";
    ctx.fillRect(o.x, o.y + o.h * 0.4, o.w, 6);
  } else if (o.type === "low") {
    // haengende Bande (Banner oben)
    ctx.fillStyle = "#5d6b8a";
    roundRectAbs(o.x, o.y, o.w, o.h, 6);
    ctx.fill();
    ctx.fillStyle = "#48557030";
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.fillStyle = "#cdd5e0";
    ctx.fillRect(o.x + 4, o.y + o.h - 10, o.w - 8, 4);
  } else {
    // Huetchen (orange, gedaempft)
    ctx.fillStyle = "#d98a3d";
    ctx.beginPath();
    ctx.moveTo(o.x + o.w * 0.5, o.y);
    ctx.lineTo(o.x + o.w, o.y + o.h);
    ctx.lineTo(o.x, o.y + o.h);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#eaddc7";
    ctx.fillRect(o.x, o.y + o.h - 6, o.w, 6);
  }
  ctx.restore();
}

function drawHeart(x, y, s, filled) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(0, 0, -s * 0.5, 0, -s * 0.5, s * 0.35);
  ctx.bezierCurveTo(-s * 0.5, s * 0.65, 0, s * 0.85, 0, s);
  ctx.bezierCurveTo(0, s * 0.85, s * 0.5, s * 0.65, s * 0.5, s * 0.35);
  ctx.bezierCurveTo(s * 0.5, 0, 0, 0, 0, s * 0.3);
  ctx.closePath();
  ctx.fillStyle = filled ? "#d96a6a" : "rgba(255,255,255,0.18)";
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  // Score + Bestwert rechts
  ctx.fillStyle = "#eef1f5";
  ctx.font = "700 26px -apple-system, sans-serif";
  ctx.textAlign = "right";
  ctx.fillText(String(Math.floor(score)).padStart(5, "0"), W - 20, 38);
  ctx.font = "600 14px -apple-system, sans-serif";
  ctx.fillStyle = "#aeb8c6";
  ctx.fillText(t("best") + " " + best, W - 20, 58);
  ctx.fillText("⚽ " + balls + "   " + Math.floor(distance / 10) + " " + t("meters"), W - 20, 78);

  // Herzen links (inkl. evtl. Extra-Leben)
  const maxHearts = Math.max(MAX_LIVES, lives);
  for (let i = 0; i < maxHearts; i++) {
    drawHeart(28 + i * 30, 22, 18, i < lives);
  }

  // Etappen-Fortschritt (Mitte oben)
  const lv = LEVELS[levelIndex] || LEVELS[0];
  const bw = 200, bx = (W - bw) / 2, by = 24;
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(bx, by, bw, 8);
  ctx.fillStyle = lv.flag[1];
  ctx.fillRect(bx, by, bw * Math.min(1, levelDist / LEVEL_GOAL), 8);
  ctx.fillStyle = "#dfe5ee";
  ctx.font = "600 14px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(tCountry(lv.key), W / 2, by - 6);
  ctx.textAlign = "left";
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function roundRectAbs(x, y, w, h, r) { roundRect(x, y, w, h, r); }

function drawCollectible(c) {
  const yy = c.y + Math.sin(c.bob) * 4; // dezentes Schweben
  ctx.save();
  if (c.type === "trophy") {
    // goldener Pokal
    ctx.fillStyle = "#f0d061";
    ctx.strokeStyle = "#b8922e";
    ctx.lineWidth = 2;
    const s = c.size;
    ctx.beginPath();
    ctx.moveTo(c.x - s * 0.3, yy - s * 0.4);
    ctx.lineTo(c.x + s * 0.3, yy - s * 0.4);
    ctx.lineTo(c.x + s * 0.18, yy + s * 0.05);
    ctx.lineTo(c.x - s * 0.18, yy + s * 0.05);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillRect(c.x - s * 0.06, yy + s * 0.05, s * 0.12, s * 0.18);
    ctx.fillRect(c.x - s * 0.22, yy + s * 0.23, s * 0.44, s * 0.1);
  } else {
    // Fussball
    ctx.fillStyle = "#eef1f5";
    ctx.beginPath();
    ctx.arc(c.x, yy, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#3a4250";
    ctx.beginPath();
    ctx.arc(c.x, yy, c.r * 0.32, 0, Math.PI * 2);
    ctx.fill();
    for (let i = 0; i < 5; i++) {
      const a = c.bob * 0.3 + i * (Math.PI * 2 / 5);
      ctx.beginPath();
      ctx.arc(c.x + Math.cos(a) * c.r * 0.62, yy + Math.sin(a) * c.r * 0.62, c.r * 0.16, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const a = Math.max(0, 1 - p.t / p.life);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  // dezente Kamera-Mikrobewegung (Flow)
  let ox = 0, oy = 0;
  if (state === State.PLAY) {
    ox = Math.sin(runTime * 1.7) * 2.2;
    oy = Math.cos(runTime * 2.3) * 1.8;
  }
  if (shake > 0) {
    const m = shake * 18;
    ox += Math.sin(runTime * 90) * m;
    oy += Math.cos(runTime * 110) * m;
  }
  ctx.translate(ox, oy);

  drawBackground();
  for (const c of collectibles) drawCollectible(c);
  for (const o of obstacles) drawObstacle(o);
  drawParticles();
  // bei Unverwundbarkeit blinkt die Ente
  if (state === State.PLAY || state === State.OVER) {
    if (!(invuln > 0 && Math.floor(runTime * 12) % 2 === 0)) drawDuck();
  }
  ctx.restore();
  if (state === State.PLAY) drawHUD();
}

// ---- Game-Loop ----
let last = 0;
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;
  if (!isFinite(dt) || dt < 0) dt = 0;

  update(dt);
  render();
  requestAnimationFrame(frame);
}

// Anfangsposition fuer Menue-Render
duck.y = GROUND_Y - duck.h;
requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
</script>
